<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Roguelike Prototype</title>

<style>
body {
    background:black;
    color:white;
    font-family: monospace;
    text-align:center;
}

#game {
    line-height: 1.1;
    font-size: 20px;
    user-select:none;
}
</style>
</head>

<body>

<h3>Roguelike Prototype</h3>
<pre id="game"></pre>

<script>

const WIDTH = 40;
const HEIGHT = 22;

let map = [];
let player = {x:2,y:2};

function createMap(){

    map = [];

    for(let y=0;y<HEIGHT;y++){

        map[y] = [];

        for(let x=0;x<WIDTH;x++){

            if(
                x===0 || y===0 ||
                x===WIDTH-1 || y===HEIGHT-1
            ){
                map[y][x] = "#";
            } else {

                map[y][x] =
                    Math.random()<0.45 ? "#" : ".";
            }

        }

    }

}

function draw(){

    let out="";

    for(let y=0;y<HEIGHT;y++){

        for(let x=0;x<WIDTH;x++){

            if(player.x===x && player.y===y){
                out+="@";
            } else {
                out+=map[y][x];
            }

        }

        out+="\n";

    }

    document.getElementById("game").textContent = out;

}

function move(dx,dy){

    let nx = player.x + dx;
    let ny = player.y + dy;

    if(map[ny][nx] === "."){
        player.x = nx;
        player.y = ny;
    }

    draw();

}

document.addEventListener("keydown",(e)=>{

    if(e.key==="ArrowUp") move(0,-1);
    if(e.key==="ArrowDown") move(0,1);
    if(e.key==="ArrowLeft") move(-1,0);
    if(e.key==="ArrowRight") move(1,0);

});

document.getElementById("game").addEventListener("click",(e)=>{

    const rect = e.target.getBoundingClientRect();

    const charWidth = rect.width / WIDTH;
    const charHeight = rect.height / HEIGHT;

    const x = Math.floor((e.clientX - rect.left)/charWidth);
    const y = Math.floor((e.clientY - rect.top)/charHeight);

    let dx = Math.sign(x - player.x);
    let dy = Math.sign(y - player.y);

    move(dx,dy);

});

createMap();
draw();

</script>

</body>
</html>
