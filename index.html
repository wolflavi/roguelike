<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Roguelike Prototype</title>

<style>
body{
 background:black;
 color:white;
 font-family:monospace;
 text-align:center;
}

#game{
 font-size:20px;
 line-height:1.1;
 user-select:none;
}
</style>

</head>

<body>

<h3>Roguelike Prototype</h3>
<pre id="game"></pre>

<script>

const WIDTH = 60
const HEIGHT = 30
const ROOM_COUNT = 8

let map=[]
let rooms=[]
let player={x:0,y:0}

function createEmptyMap(){

 map=[]

 for(let y=0;y<HEIGHT;y++){

  map[y]=[]

  for(let x=0;x<WIDTH;x++){

   map[y][x]="#"

  }

 }

}

function createRoom(x,y,w,h){

 for(let i=y;i<y+h;i++){

  for(let j=x;j<x+w;j++){

   map[i][j]="."

  }

 }

}

function createHTunnel(x1,x2,y){

 for(let x=Math.min(x1,x2);x<=Math.max(x1,x2);x++){

  map[y][x]="."

 }

}

function createVTunnel(y1,y2,x){

 for(let y=Math.min(y1,y2);y<=Math.max(y1,y2);y++){

  map[y][x]="."

 }

}

function generateDungeon(){

 createEmptyMap()

 rooms=[]

 for(let r=0;r<ROOM_COUNT;r++){

  let w=4+Math.floor(Math.random()*6)
  let h=4+Math.floor(Math.random()*6)

  let x=1+Math.floor(Math.random()*(WIDTH-w-2))
  let y=1+Math.floor(Math.random()*(HEIGHT-h-2))

  createRoom(x,y,w,h)

  let newRoom={
   x:x,
   y:y,
   w:w,
   h:h,
   cx:Math.floor(x+w/2),
   cy:Math.floor(y+h/2)
  }

  if(rooms.length>0){

   let prev=rooms[rooms.length-1]

   if(Math.random()<0.5){

    createHTunnel(prev.cx,newRoom.cx,prev.cy)
    createVTunnel(prev.cy,newRoom.cy,newRoom.cx)

   }else{

    createVTunnel(prev.cy,newRoom.cy,prev.cx)
    createHTunnel(prev.cx,newRoom.cx,newRoom.cy)

   }

  }

  rooms.push(newRoom)

 }

 player.x=rooms[0].cx
 player.y=rooms[0].cy

}

function draw(){

 let out=""

 for(let y=0;y<HEIGHT;y++){

  for(let x=0;x<WIDTH;x++){

   if(player.x===x && player.y===y){

    out+="@"

   }else{

    out+=map[y][x]

   }

  }

  out+="\n"

 }

 document.getElementById("game").textContent=out

}

function move(dx,dy){

 let nx=player.x+dx
 let ny=player.y+dy

 if(map[ny][nx]==="."){

  player.x=nx
  player.y=ny

 }

 draw()

}

document.addEventListener("keydown",e=>{

 if(e.key==="ArrowUp")move(0,-1)
 if(e.key==="ArrowDown")move(0,1)
 if(e.key==="ArrowLeft")move(-1,0)
 if(e.key==="ArrowRight")move(1,0)

})

document.getElementById("game").addEventListener("click",e=>{

 const rect=e.target.getBoundingClientRect()

 const cw=rect.width/WIDTH
 const ch=rect.height/HEIGHT

 const x=Math.floor((e.clientX-rect.left)/cw)
 const y=Math.floor((e.clientY-rect.top)/ch)

 let dx=Math.sign(x-player.x)
 let dy=Math.sign(y-player.y)

 move(dx,dy)

})

generateDungeon()
draw()

</script>

</body>
</html>
